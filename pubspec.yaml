name: viperwallet
description: "A professional Solana wallet with glassmorphism design"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core dependencies
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.1

  # Network & HTTP
  http: ^1.1.0
  connectivity_plus: ^5.0.2

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Crypto & Blockchain
  solana: ^0.31.2+1
  crypto: ^3.0.3
  bs58: ^1.0.2
  bip39: ^1.0.6
  ed25519_hd_key: ^2.2.0

  # UI & Charts
  fl_chart: ^0.66.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Utils
  url_launcher: ^6.2.2
  package_info_plus: ^4.2.0
  device_info_plus: ^9.1.1
  local_auth: ^2.1.7

dependency_overrides:
  pinenacl: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
